<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Riemann Sum Convergence — f(x)=x² on [0,1]</title>
  <style>
    :root{--bg:#f7f9fc;--card:#fff;--accent:#2b7cff;--muted:#666}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial;background:var(--bg);color:#111}
    .wrap{max-width:860px;margin:36px auto;padding:24px}
    header{margin-bottom:12px}
    h1{margin:0 0 6px;font-size:20px}
    p.desc{margin:0;color:var(--muted)}
    .card{background:var(--card);border-radius:10px;padding:18px;margin-top:18px;box-shadow:0 6px 20px rgba(23,33,56,0.06)}
    .canvas-row{display:flex;gap:20px;align-items:flex-start}
    canvas{background:linear-gradient(180deg,#ffffff, #fbfdff);border-radius:8px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.6);}
    .controls{flex:1;min-width:220px}
    .controls .row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .controls label{font-size:13px;color:var(--muted)}
    input[type=range]{width:100%}
    .meta{margin-top:12px;display:flex;gap:18px;flex-wrap:wrap}
    .meta .box{background:#f2f6ff;padding:10px 12px;border-radius:8px;color:#072e8a}
    .meta .exact{background:#eefdf3;color:#0a6b2e}
    .small{font-size:13px;color:var(--muted)}
    .footer{margin-top:14px;font-size:13px;color:var(--muted)}
    button{background:var(--accent);color:white;border:0;padding:8px 12px;border-radius:8px;cursor:pointer}
    button.secondary{background:#eee;color:#111}
    @media (max-width:780px){.canvas-row{flex-direction:column}.controls{width:100%}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Riemann Sum Convergence — f(x) = x² on [0,1]</h1>
      <p class="desc">Use the slider or autoplay to see the left-endpoint Riemann sum approach the exact integral value.</p>
    </header>

    <div class="card">
      <div class="canvas-row">
        <canvas id="c" width="700" height="320"></canvas>
        <div class="controls">
          <div class="row">
            <label for="nrange">Rectangles (n):</label>
            <div style="flex:1">
              <input id="nrange" type="range" min="1" max="50" value="6">
            </div>
          </div>
          <div class="row">
            <div class="small">n = <strong id="nval">6</strong></div>
            <button id="play">Play</button>
            <button id="step" class="secondary">Step</button>
            <button id="reset" class="secondary">Reset</button>
          </div>
          <div class="meta">
            <div class="box">Approximation: <strong id="approx">0.000</strong></div>
            <div class="box exact">Exact: <strong>1/3 = 0.3333333333</strong></div>
          </div>
          <div class="footer small">Method: left-endpoint Riemann sum. Curve: <em>f(x)=x²</em>. Interval: [0,1].</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Canvas and layout
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const DPR = window.devicePixelRatio || 1;
    const W = canvas.width; const H = canvas.height;
    // drawing area inside canvas with margins
    const margin = {l:48, r:20, t:16, b:44};
    const drawW = W - margin.l - margin.r;
    const drawH = H - margin.t - margin.b;

    // DOM controls
    const nrange = document.getElementById('nrange');
    const nval = document.getElementById('nval');
    const approxEl = document.getElementById('approx');
    const playBtn = document.getElementById('play');
    const stepBtn = document.getElementById('step');
    const resetBtn = document.getElementById('reset');

    // math
    const f = x => x*x;
    const exact = 1/3;

    // state
    let n = parseInt(nrange.value,10) || 6;
    let playing = false;
    let lastStepTime = 0;
    const playInterval = 600; // ms per increment

    function toCanvasX(x){ return margin.l + x * drawW; }
    function toCanvasY(y){ return margin.t + (1 - y) * drawH; }

    function drawAxes(){
      ctx.strokeStyle = '#d7e3f9';
      ctx.lineWidth = 1;
      // x-axis
      ctx.beginPath(); ctx.moveTo(margin.l, margin.t + drawH); ctx.lineTo(margin.l + drawW, margin.t + drawH); ctx.stroke();
      // y ticks and labels (0, 0.5, 1)
      ctx.fillStyle = '#556'; ctx.font = '12px sans-serif'; ctx.textAlign = 'right';
      [0,0.25,0.5,0.75,1].forEach(v => {
        const y = toCanvasY(v);
        ctx.beginPath(); ctx.moveTo(margin.l - 6, y); ctx.lineTo(margin.l, y); ctx.stroke();
        ctx.fillText(String(v.toFixed(2)), margin.l - 10, y + 4);
      });
      ctx.textAlign = 'center';
      ctx.fillText('x', margin.l + drawW + 12, margin.t + drawH + 4);
    }

    function drawCurve(){
      ctx.beginPath();
      const samples = 300;
      for(let i=0;i<=samples;i++){
        const x = i / samples;
        const px = toCanvasX(x);
        const py = toCanvasY(f(x));
        if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.strokeStyle = '#111'; ctx.lineWidth = 2; ctx.stroke();
    }

    function drawRectangles(n){
      const dx = 1 / n;
      ctx.fillStyle = 'rgba(43,124,255,0.25)';
      ctx.strokeStyle = 'rgba(43,124,255,0.6)';
      ctx.lineWidth = 1;
      for(let i=0;i<n;i++){
        const x = i * dx; // left endpoint
        const h = f(x);
        const sx = toCanvasX(x);
        const sy = toCanvasY(h);
        const sw = drawW * dx - 1; // small spacing
        const sh = toCanvasY(0) - sy;
        ctx.fillRect(sx+0.5, sy, sw, sh);
        ctx.strokeRect(sx+0.5, sy, sw, sh);
      }
    }

    function computeApprox(n){
      const dx = 1 / n;
      let sum = 0;
      for(let i=0;i<n;i++) sum += f(i*dx) * dx;
      return sum;
    }

    function render(){
      // clear
      ctx.clearRect(0,0,W,H);
      // background grid
      ctx.fillStyle = '#fff'; ctx.fillRect(0,0,W,H);
      // draw axes and curve
      drawAxes();
      drawCurve();
      // draw rectangles
      drawRectangles(n);
      // labels
      const approx = computeApprox(n);
      approxEl.textContent = approx.toFixed(6);
      nval.textContent = n;
    }

    // interactions
    nrange.addEventListener('input', e => {
      n = Math.max(1, Math.min(50, parseInt(e.target.value,10)||1));
      render();
    });

    playBtn.addEventListener('click', ()=>{
      playing = !playing;
      playBtn.textContent = playing ? 'Pause' : 'Play';
      if(playing) lastStepTime = performance.now();
    });

    stepBtn.addEventListener('click', ()=>{
      n = Math.min(50, n+1);
      nrange.value = n; render();
    });

    resetBtn.addEventListener('click', ()=>{
      playing = false; playBtn.textContent = 'Play'; n = 1; nrange.value = n; render();
    });

    // animation loop
    function loop(ts){
      if(playing && ts - lastStepTime > playInterval){
        lastStepTime = ts;
        if(n < 50) n++; else { playing = false; playBtn.textContent = 'Play'; }
        nrange.value = n;
        render();
      }
      requestAnimationFrame(loop);
    }

    // initial render
    render();
    requestAnimationFrame(loop);

    // make the canvas crisp on high-DPI (optional)
    // Note: canvas size is fixed here; for responsive scaling you'd want to adapt on resize.
  </script>
</body>
</html>
